name: Build

on:
  push:
    paths:
      - "source/**"
      - "pipeline/**"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y webp imagemagick

      - name: Detect changed projects and run pipelines
        run: |
          # If pipeline or workflow files changed, rebuild all projects
          REBUILD_ALL=0
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD -- pipeline/ .github/ | grep -q .; then
              REBUILD_ALL=1
            fi
            CHANGED_PROJECTS=$(git diff --name-only HEAD~1 HEAD -- source/ | cut -d/ -f2 | sort -u)
          else
            REBUILD_ALL=1
          fi
          if [ "$REBUILD_ALL" = 1 ] && [ -z "$CHANGED_PROJECTS" ]; then
            CHANGED_PROJECTS=$(ls -d source/*/ 2>/dev/null | xargs -I{} basename {} | sort -u)
          fi
          if [ -z "$CHANGED_PROJECTS" ]; then
            echo "No project changes detected"
            exit 0
          fi
          for PROJECT in $CHANGED_PROJECTS; do
            PIPELINE=$(cat "source/$PROJECT/.pipeline" 2>/dev/null || echo "")
            PIPELINE=$(echo "$PIPELINE" | tr -d '[:space:]')
            if [ -z "$PIPELINE" ] || [ "$PIPELINE" = "..." ]; then
              echo "Skipping $PROJECT (no pipeline configured)"
              continue
            fi
            echo "Running pipeline/$PIPELINE.sh for $PROJECT"
            bash "pipeline/$PIPELINE.sh" "$PROJECT"
          done

      - name: Commit and push docs
        run: |
          if [ -d docs/ ] && git diff --quiet docs/ && [ -z "$(git ls-files --others docs/)" ]; then
            echo "No changes to docs/"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Build: update docs/ $(date +%Y-%m-%d)"
          git pull --rebase
          git push
